name: go

on:
  push:
    paths:
      - ".github/workflows/go.yml"
      - ".golangci.yml"
      - "go.mod"
      - "go.sum"
      - "testsuite/**"
      - "examples/**"
      - "**/*.go"
  pull_request:
    paths:
      - ".github/workflows/go.yml"
      - ".golangci.yml"
      - "go.mod"
      - "go.sum"
      - "testsuite/**"
      - "examples/**"
      - "**/*.go"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: -mod=readonly

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            testsuite/go.mod
            testsuite/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.8.0

  vet:
    name: go vet
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            testsuite/go.mod
            testsuite/go.sum

      - name: Run go vet
        run: go vet ./...

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            testsuite/go.mod
            testsuite/go.sum

      - name: Run unit tests
        run: go test ./... -count=1

  integration:
    name: integration test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            testsuite/go.mod
            testsuite/go.sum

      - name: Run integration tests
        working-directory: testsuite
        run: go test -tags integration ./... -count=1

  race:
    name: race test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: |
            go.mod
            go.sum
            testsuite/go.mod
            testsuite/go.sum

      - name: Run focused race tests
        run: go test -race ./ ./cache ./detect ./ir ./process ./internal/pipeline -count=1
